version: "3.9"

services:
  db:
    image: postgres:15
    container_name: employee_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: employee_portal
    ports:
      - "5434:5432"

  backend:
    build: .
    container_name: employee_backend
    depends_on:
      - db
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/employee_portal
    command: >
      sh -c "sleep 5 && uvicorn app.main:app --host 0.0.0.0 --port 8000"